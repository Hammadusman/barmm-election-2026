<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BARMM Election Dashboard</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>BARMM Parliamentary Election Dashboard</header>

<div class="container">

<div class="card">
    <h2>Election Input</h2>

    <div id="partyContainer"></div>

    <div class="btn-group">
        <button class="btn-primary" onclick="addParty()">+ Add Party</button>
        <button class="btn-primary" onclick="calculateSeats()">Calculate</button>
    </div>
</div>

<div class="card">
    <h2>Summary</h2>
    <p>Parties: <b id="totalParties">0</b></p>
    <p>Total Voters: <b id="totalVoters">0</b></p>
</div>

<div class="card">
    <h2>Results</h2>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Party</th>
                    <th>Votes</th>
                    <th>%</th>
                    <th>Seats</th>
                </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
        </table>
    </div>
</div>

<div class="card">
    <h2>Graph</h2>
    <canvas id="chart"></canvas>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
