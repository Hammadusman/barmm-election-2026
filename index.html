<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BARMM Election Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --green-main: #15803d;
    --green-light: #dcfce7;
    --green-hover: #166534;
    --danger: #dc2626;
}

* { box-sizing: border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #f0fdf4;
}

header {
    background: var(--green-main);
    color: white;
    padding: 16px;
    text-align: center;
    font-weight: bold;
}

.container {
    max-width: 950px;
    margin: auto;
    padding: 15px;
}

.card {
    background: white;
    padding: 16px;
    border-radius: 10px;
    margin-bottom: 15px;
}

h2 { color: var(--green-main); }

input {
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    width: 100%;
    margin-bottom: 8px;
}

.btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

button {
    padding: 10px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    flex: 1;
}

.btn-primary {
    background: var(--green-main);
    color: white;
}

.btn-primary:hover {
    background: var(--green-hover);
}

.btn-danger {
    background: var(--danger);
    color: white;
    padding: 5px 8px;
    font-size: 12px;
    border-radius: 6px;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* PARTY */
.party-row {
    display: flex;
    gap: 6px;
    align-items: center;
}

.party-row input {
    flex: 1;
}

/* TABLE */
.table-wrapper {
    overflow-x: auto;
}

table {
    width: 100%;
    min-width: 500px;
    border-collapse: collapse;
}

th {
    background: var(--green-light);
}

th, td {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #eee;
}
</style>
</head>

<body>

<header>BARMM Parliamentary Election Dashboard</header>

<div class="container">

<div class="card">
    <h2>Election Input</h2>

    <div id="partyContainer"></div>

    <div class="btn-group">
        <button class="btn-primary" onclick="addParty()">+ Add Party</button>
        <button class="btn-primary" onclick="calculateSeats()">Calculate</button>
    </div>
</div>

<div class="card">
    <h2>Summary</h2>
    <p>Parties: <b id="totalParties">0</b></p>
    <p>Total Voters: <b id="totalVoters">0</b></p>
</div>

<div class="card">
    <h2>Results</h2>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Party</th>
                    <th>Votes</th>
                    <th>%</th>
                    <th>Seats</th>
                </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
        </table>
    </div>
</div>

<div class="card">
    <h2>Graph</h2>
    <canvas id="chart"></canvas>
</div>

</div>

<script>
let chart;

// ADD PARTY
function addParty() {
    const div = document.createElement("div");
    div.className = "party-row";
    div.innerHTML = `
        <input type="text" placeholder="Party Name">
        <input type="number" placeholder="Votes">
        <button class="btn-danger" onclick="removeParty(this)">✕</button>
    `;
    document.getElementById("partyContainer").appendChild(div);
}

// REMOVE PARTY
function removeParty(btn) {
    btn.parentElement.remove();
}

// GET TOTAL VOTES (AUTO TOTAL VOTERS)
function getTotalVotesEntered() {
    let total = 0;
    document.querySelectorAll("#partyContainer input[type='number']")
        .forEach(i => total += Number(i.value) || 0);
    return total;
}

// CALCULATE
function calculateSeats() {
    let parties = [];
    const totalVoters = getTotalVotesEntered();

    if (totalVoters === 0) return alert("Enter votes first!");

    document.querySelectorAll(".party-row").forEach((row, i) => {
        let name = row.children[0].value || `Party ${i+1}`;
        let votes = Number(row.children[1].value);

        if (!votes) return;

        let percentage = Math.floor((votes / totalVoters) * 100);
        let seats = Math.floor((percentage * 40) / 100);

        parties.push({ name, votes, percentage, seats });
    });

    let allocated = parties.reduce((s,p)=>s+p.seats,0);
    let remaining = 40 - allocated;

    parties.sort((a,b)=>b.votes-a.votes);

    let i=0;
    while(remaining>0){
        parties[i].seats++;
        remaining--;
        i=(i+1)%parties.length;
    }

    displayResults(parties);
    drawGraph(parties);

    document.getElementById("totalParties").innerText = parties.length;
    document.getElementById("totalVoters").innerText = totalVoters;
}

// DISPLAY RESULTS
function displayResults(parties) {
    const tbody = document.getElementById("resultsBody");
    tbody.innerHTML = "";

    parties.forEach((p,i)=>{
        tbody.innerHTML += `
        <tr>
            <td>${i+1}</td>
            <td>${p.name}</td>
            <td>${p.votes}</td>
            <td>${p.percentage}%</td>
            <td>${p.seats}</td>
        </tr>`;
    });
}

// GRAPH
function drawGraph(parties){
    const labels = parties.map(p=>p.name);
    const votes = parties.map(p=>p.votes);
    const seats = parties.map(p=>p.seats);

    const colors = labels.map((_,i)=>`hsl(${i*360/labels.length},70%,60%)`);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"),{
        type:"bar",
        data:{
            labels,
            datasets:[{
                data:votes,
                backgroundColor:colors
            }]
        },
        options:{
            plugins:{
                legend:{ display:false },
                tooltip:{
                    callbacks:{
                        label:(c)=>{
                            let i=c.dataIndex;
                            return [
                                `Votes: ${votes[i]}`,
                                `Seats: ${seats[i]}`,
                                `Rank: ${i+1}`
                            ];
                        }
                    }
                }
            }
        }
    });
}

// INIT
window.onload = ()=>addParty();
</script>

</body>
</html>
